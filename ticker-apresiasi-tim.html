<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Ticker Apresiasi Tim</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg: #ffffff;
    --panel: #f7f8fa;
    --accent: #e8720c;      /* senada dengan jam */
    --navy: #1f2a44;        /* senada dengan jam */
    --text: #1f2a44;
    --muted: #8a93a6;
    --border: #e4e7ee;
  }

  html, body{
    margin:0; padding:0; height:100%;
    background: transparent;
    overflow:hidden;
    font-family:'Space Grotesk', sans-serif;
  }

  .ticker-bar{
    display:flex;
    align-items:center;
    width:100%;
    height: 8vh;
    min-height: 56px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    box-sizing: border-box;
  }

  .tag{
    flex: 0 0 auto;
    display:flex;
    align-items:center;
    gap: 10px;
    height:100%;
    padding: 0 3vw;
    background: var(--accent);
    color: #ffffff;
    font-family:'IBM Plex Mono', monospace;
    font-weight:700;
    font-size: clamp(14px, 1.6vw, 22px);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    white-space: nowrap;
    clip-path: polygon(0 0, 100% 0, calc(100% - 18px) 100%, 0 100%);
    padding-right: calc(3vw + 18px);
  }

  .dot{
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #ffffff;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse{
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.35; transform: scale(0.8); }
  }

  .ticker-viewport{
    flex: 1 1 auto;
    overflow: hidden;
    height: 100%;
    display:flex;
    align-items:center;
    position: relative;
  }

  .ticker-track{
    display:flex;
    align-items:center;
    white-space: nowrap;
    animation: scroll-left 22s linear infinite;
  }

  .ticker-track span{
    font-size: clamp(16px, 2vw, 28px);
    color: var(--navy);
    padding: 0 4vw;
    white-space: nowrap;
  }

  .ticker-track span b{
    color: var(--accent);
    font-weight: 700;
  }

  .sep-icon{
    color: var(--muted);
    font-size: 0.7em;
  }

  @keyframes scroll-left{
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
</style>
</head>
<body>

  <div class="ticker-bar">
    <div class="tag">
      <span class="dot"></span>
      Pengumuman
    </div>
    <div class="ticker-viewport">
      <div class="ticker-track" id="track">
        <!-- konten digandakan 2x lewat JS agar loop mulus -->
      </div>
    </div>
  </div>

<script>
  const pesan = 'Direktur P2D menyampaikan Terima kasih kepada Tim yang berhasil <b>Juara 1, 2, dan 3</b> — Pertahankan! ' +
                'Dan untuk Tim lain, agar segera dioptimalkan. <span class="sep-icon">&#9679;&#9679;&#9679;</span>';

  const track = document.getElementById('track');
  // digandakan 2x supaya animasi translateX(-50%) looping mulus tanpa jeda
  track.innerHTML = '<span>' + pesan + '</span>'.repeat(1) + '<span>' + pesan + '</span>';
</script>

</body>
</html>
