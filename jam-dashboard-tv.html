<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Jam Dashboard TV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@500;600&display=swap');
 
  :root{
    --bg: #ffffff;
    --panel: #f7f8fa;
    --accent: #e8720c;
    --navy: #1f2a44;
    --text: #1f2a44;
    --muted: #8a93a6;
    --border: #e4e7ee;
  }
 
  html, body{
    margin:0; padding:0;
    width:100%; height:100%;
    background: transparent;
    overflow:hidden;
    font-family:'Space Grotesk', sans-serif;
  }
 
  .clock-bar{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 3vw;
    width:100%;
    height:100%;
    box-sizing: border-box;
    padding: 0 3vw;
    background: var(--panel);
    border: 1px solid var(--border);
  }
 
  .time-row{
    display:flex; align-items:baseline; gap: 0.6vw;
  }
 
  .time{
    font-family:'IBM Plex Mono', monospace;
    font-weight:700;
    font-size: 10vw;
    line-height:1;
    color: var(--navy);
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
 
  .time .sep{
    color: var(--accent);
    animation: blink 1s steps(1) infinite;
  }
 
  .seconds{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size: 1.8vw;
    color: var(--accent);
    align-self:flex-end;
    margin-bottom: 0.5vw;
    min-width: 2.2ch;
    text-align:left;
  }
 
  .divider{
    width:1px;
    height: 50%;
    background: var(--border);
    flex: 0 0 auto;
  }
 
  .date-col{
    display:flex; flex-direction:column; gap:6px;
    flex: 1 1 auto;
    min-width: 0;
  }
 
  .date{
    font-size: 1.3vw;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    white-space: nowrap;
  }
 
  .bar{
    width: 100%;
    max-width: 260px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill{
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 1s linear;
  }
 
  @keyframes blink{
    50% { opacity: 0.25; }
  }
</style>
</head>
<body>
 
  <div class="clock-bar">
    <div class="time-row">
      <div class="time" id="hhmm">--<span class="sep">:</span>--</div>
      <div class="seconds" id="ss">--</div>
    </div>
    <div class="divider"></div>
    <div class="date-col">
      <div class="date" id="date">-</div>
      <div class="bar"><div class="bar-fill" id="barFill"></div></div>
    </div>
  </div>
 
<script>
  const hari = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const bulan = ['Januari','Februari','Maret','April','Mei','Juni','Juli',
                 'Agustus','September','Oktober','November','Desember'];
 
  function pad(n){ return n.toString().padStart(2,'0'); }
 
  function tick(){
    const now = new Date();
    document.getElementById('hhmm').innerHTML =
      pad(now.getHours()) + '<span class="sep">:</span>' + pad(now.getMinutes());
    document.getElementById('ss').textContent = pad(now.getSeconds());
    document.getElementById('date').textContent =
      hari[now.getDay()] + ', ' + now.getDate() + ' ' + bulan[now.getMonth()] + ' ' + now.getFullYear();
    document.getElementById('barFill').style.width = (now.getSeconds()/59*100) + '%';
  }
 
  tick();
  setInterval(tick, 1000);
</script>
 
</body>
</html>
