<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Rotasi Dashboard TV</title>
<style>
  html, body{
    margin:0; padding:0;
    width:100%; height:100%;
    overflow:hidden;
    background:#ffffff;
  }

  .slide{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    opacity:0;
    visibility:hidden;
    transition: opacity 0.4s ease;
  }

  .slide.active{
    opacity:1;
    visibility:visible;
  }

  iframe{
    width:100%; height:100%;
    border:none;
  }
</style>
</head>
<body>

  <!-- Halaman 1: SDM -->
  <div class="slide active" id="slide0">
    <iframe src="https://datastudio.google.com/embed/reporting/3c8a6bd5-b704-4a07-a1bd-e98fc57fb1ce/page/p_n0fz80cc5d"></iframe>
  </div>

  <!-- Halaman 2: Dashboard Anggaran -->
  <div class="slide" id="slide1">
    <iframe src="https://datastudio.google.com/embed/reporting/3c8a6bd5-b704-4a07-a1bd-e98fc57fb1ce/page/p_b43q8v4c5d"></iframe>
  </div>

<script>
  // Durasi tampil tiap halaman, dalam MILIDETIK (1000 = 1 detik)
  // Urutan harus sama dengan urutan slide0 (SDM), slide1 (Anggaran) di atas
  const durasi = [5000, 10000]; // Halaman 1 (SDM): 5 dtk, Halaman 2 (Anggaran): 10 dtk

  const slides = document.querySelectorAll('.slide');
  let current = 0;

  function nextSlide(){
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
    setTimeout(nextSlide, durasi[current]);
  }

  setTimeout(nextSlide, durasi[current]);
</script>

</body>
</html>
