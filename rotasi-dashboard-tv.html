<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotasi Dashboard TV</title>
<style>
  html, body {
    margin: 0; 
    padding: 0;
    width: 100%; 
    height: 100%;
    overflow: hidden;
    background: #0f172a;
    font-family: Arial, sans-serif;
  }
  
  .main-wrapper {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  .slides-container {
    position: relative;
    flex: 1; 
    width: 100%;
    background: #000;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; 
    height: 100%;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.5s ease-in-out;
  }
  
  .slide.active {
    opacity: 1;
    visibility: visible;
  }
  
  /* Membungkus iframe dengan teknik skala agar pas dan tidak perlu scroll */
  .iframe-wrapper {
    width: 1920px;  /* Sesuaikan dengan Lebar Kanvas Looker Studio Anda */
    height: 1080px; /* Sesuaikan dengan Tinggi Kanvas Looker Studio Anda */
    transform-origin: top left;
    position: absolute;
    top: 0;
    left: 0;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Styling Ticker / Pengumuman di Luar Iframe */
  .ticker-bar {
    height: 0px; 
    background-color: #ea580c; 
    color: #ffffff;
    display: flex;
    align-items: center;
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    border-top: 0px solid #c2410c;
    transition: height 0.3s ease, border-top 0.3s ease;
    flex-shrink: 0;
    z-index: 99;
  }

  .ticker-bar.show {
    height: 45px;
    border-top: 2px solid #c2410c;
  }

  .ticker-label {
    background-color: #c2410c;
    color: white;
    padding: 0 20px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: bold;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .ticker-content {
    display: inline-block;
    padding-left: 100%;
    animation: marquee 30s linear infinite;
    font-size: 16px;
    font-weight: bold;
  }

  @keyframes marquee {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
  }
</style>
</head>
<body>

  <div class="main-wrapper">
    <!-- Container untuk Slide Looker Studio -->
    <div class="slides-container" id="slidesContainer">
      <!-- Halaman 1: SDM -->
      <div class="slide active" id="slide0">
        <div class="iframe-wrapper" id="scaleWrapper0">
          <iframe src="https://datastudio.google.com/embed/reporting/3c8a6bd5-b704-4a07-a1bd-e98fc57fb1ce/page/p_n0fz80cc5d?ui=false"></iframe>
        </div>
      </div>
     
      <!-- Halaman 2: Dashboard Anggaran -->
      <div class="slide" id="slide1">
        <div class="iframe-wrapper" id="scaleWrapper1">
          <iframe src="https://datastudio.google.com/embed/reporting/3c8a6bd5-b704-4a07-a1bd-e98fc57fb1ce/page/p_b43q8v4c5d?ui=false"></iframe>
        </div>
      </div>
    </div>

    <!-- Ticker / Pengumuman di Bagian Bawah -->
    <div class="ticker-bar" id="tickerBar">
      <div class="ticker-label">📢 PENGUMUMAN</div>
      <div class="ticker-content">
        Selamat datang di pemantauan eksekutif — Menyampaikan Terima kasih kepada Tim yang berhasil meraih Juara 1, 2, dan 3 — Pertahankan kinerja terbaik Anda! • Harap perbarui data secara berkala.
      </div>
    </div>
  </div>

<script>
  // Fungsi otomatis untuk menghitung skala ukuran agar pas dengan layar (Fit to Screen)
  function adjustScale() {
    const container = document.getElementById('slidesContainer');
    const cWidth = container.clientWidth;
    const cHeight = container.clientHeight;

    // Resolusi dasar kanvas Looker Studio Anda (Ubah jika desain Anda menggunakan ukuran lain, misal 1366x768)
    const baseWidth = 1920;
    const baseHeight = 1080;

    const scaleX = cWidth / baseWidth;
    const scaleY = cHeight / baseHeight;

    // Terapkan skala ke semua wrapper iframe
    document.querySelectorAll('.iframe-wrapper').forEach(el => {
      el.style.transform = `scale(${scaleX}, ${scaleY})`;
    });
  }

  window.addEventListener('resize', adjustScale);
  window.addEventListener('load', adjustScale);

  // Konfigurasi Halaman & Durasi Rotasi (dalam milidetik)
  const pages = [
    { duration: 10000, showTicker: false }, // Halaman 1 (SDM): 10 detik, Ticker disembunyikan
    { duration: 5000,  showTicker: true  }  // Halaman 2 (Anggaran): 5 detik, Ticker dimunculkan
  ]; 
 
  const slides = document.querySelectorAll('.slide');
  const tickerBar = document.getElementById('tickerBar');
  let current = 0;
  let timer = null;
 
  function rotatePage() {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
    
    // Panggil ulang penyesuaian skala saat slide berganti
    adjustScale();

    if (pages[current].showTicker) {
      tickerBar.classList.add('show');
    } else {
      tickerBar.classList.remove('show');
    }
    
    timer = setTimeout(rotatePage, pages[current].duration);
  }
 
  if (pages[current].showTicker) {
    tickerBar.classList.add('show');
  } else {
    tickerBar.classList.remove('show');
  }

  timer = setTimeout(rotatePage, pages[current].duration);
</script>

</body>
</html>
