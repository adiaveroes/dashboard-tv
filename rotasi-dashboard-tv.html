<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotasi Dashboard TV</title>
<style>
  html, body {
    margin: 0; 
    padding: 0;
    width: 100%; 
    height: 100%;
    overflow: hidden;
    background: #0f172a;
    font-family: Arial, sans-serif;
  }
  
  /* Layout utama: Dibagi jadi area laporan di atas dan ticker di bawah */
  .main-wrapper {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  .slides-container {
    position: relative;
    flex: 1; /* Mengisi sisa ruang layar bagian atas secara fleksibel */
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden; /* Mencegah munculnya scrollbar bawaan */
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; 
    height: 100%;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.5s ease-in-out;
  }
  
  .slide.active {
    opacity: 1;
    visibility: visible;
  }
  
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    /* Memastikan iframe pas dan tidak bisa di-scroll manual */
    overflow: hidden; 
  }

  /* Styling Ticker / Pengumuman di Luar Iframe */
  .ticker-bar {
    height: 0px; /* Default disembunyikan */
    background-color: #ea580c; 
    color: #ffffff;
    display: flex;
    align-items: center;
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    border-top: 0px solid #c2410c;
    transition: height 0.3s ease, border-top 0.3s ease;
    flex-shrink: 0;
  }

  /* Kelas aktif khusus saat Ticker dimunculkan */
  .ticker-bar.show {
    height: 45px;
    border-top: 2px solid #c2410c;
  }

  .ticker-label {
    background-color: #c2410c;
    color: white;
    padding: 0 20px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: bold;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
    z-index: 5;
  }

  .ticker-content {
    display: inline-block;
    padding-left: 100%;
    animation: marquee 30s linear infinite;
    font-size: 16px;
    font-weight: bold;
  }

  @keyframes marquee {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
  }
</style>
</head>
<body>

  <div class="main-wrapper">
    <!-- Container untuk Slide Looker Studio -->
    <div class="slides-container">
      <!-- Halaman 1: SDM (Ditambahkan &s=true agar otomatis fit screen) -->
      <div class="slide active" id="slide0">
        <iframe src="https://datastudio.google.com/embed/reporting/3c8a6bd5-b704-4a07-a1bd-e98fc57fb1ce/page/p_n0fz80cc5d?ui=false&s=true"></iframe>
      </div>
     
      <!-- Halaman 2: Dashboard Anggaran (Ditambahkan &s=true agar otomatis fit screen) -->
      <div class="slide" id="slide1">
        <iframe src="https://datastudio.google.com/embed/reporting/3c8a6bd5-b704-4a07-a1bd-e98fc57fb1ce/page/p_b43q8v4c5d?ui=false&s=true"></iframe>
      </div>
    </div>

    <!-- Ticker / Pengumuman di Bagian Bawah -->
    <div class="ticker-bar" id="tickerBar">
      <div class="ticker-label">📢 PENGUMUMAN</div>
      <div class="ticker-content">
        Selamat datang di pemantauan eksekutif — Menyampaikan Terima kasih kepada Tim yang berhasil meraih Juara 1, 2, dan 3 — Pertahankan kinerja terbaik Anda! • Harap perbarui data secara berkala.
      </div>
    </div>
  </div>

<script>
  // Konfigurasi Halaman & Durasi (dalam milidetik)
  const pages = [
    { duration: 10000, showTicker: false }, // Halaman 1 (SDM): 10 detik, Ticker disembunyikan
    { duration: 5000,  showTicker: true  }  // Halaman 2 (Anggaran): 5 detik, Ticker dimunculkan
  ]; 
 
  const slides = document.querySelectorAll('.slide');
  const tickerBar = document.getElementById('tickerBar');
  let current = 0;
  let timer = null;
 
  function rotatePage() {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
    
    if (pages[current].showTicker) {
      tickerBar.classList.add('show');
    } else {
      tickerBar.classList.remove('show');
    }
    
    timer = setTimeout(rotatePage, pages[current].duration);
  }
 
  if (pages[current].showTicker) {
    tickerBar.classList.add('show');
  } else {
    tickerBar.classList.remove('show');
  }

  timer = setTimeout(rotatePage, pages[current].duration);
</script>

</body>
</html>
