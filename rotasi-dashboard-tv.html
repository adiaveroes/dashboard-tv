<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotasi Dashboard TV</title>
<style>
  html, body {
    margin: 0; 
    padding: 0;
    width: 100%; 
    height: 100%;
    overflow: hidden;
    background: #0f172a;
    font-family: Arial, sans-serif;
  }
  
  /* Layout utama: Dibagi jadi area laporan di atas dan ticker di bawah */
  .main-wrapper {
    display: flex;
    flex-direction: column;
    width: 100vw;
    height: 100vh;
  }

  .slides-container {
    position: relative;
    flex: 1; /* Mengisi sisa ruang layar bagian atas */
    width: 100%;
    background: #000;
  }

  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; 
    height: 100%;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.5s ease-in-out;
  }
  
  .slide.active {
    opacity: 1;
    visibility: visible;
  }
  
  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Styling Ticker / Running Text di Luar Iframe */
  .ticker-bar {
    height: 45px;
    background-color: #ea580c; /* Warna oranye agar mencolok seperti contoh */
    color: #ffffff;
    display: flex;
    align-items: center;
    overflow: hidden;
    white-space: nowrap;
    position: relative;
    border-top: 2px solid #c2410c;
  }

  .ticker-label {
    background-color: #c2410c;
    color: white;
    padding: 0 20px;
    height: 100%;
    display: flex;
    align-items: center;
    font-weight: bold;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
    z-index: 5;
  }

  .ticker-content {
    display: inline-block;
    padding-left: 100%;
    animation: marquee 30s linear infinite;
    font-size: 16px;
    font-weight: bold;
  }

  @keyframes marquee {
    0% { transform: translate(0, 0); }
    100% { transform: translate(-100%, 0); }
  }
</style>
</head>
<body>

  <div class="main-wrapper">
    <!-- Container untuk Slide Looker Studio -->
    <div class="slides-container">
      <!-- Halaman 1: SDM -->
      <div class="slide active" id="slide0">
        <iframe src="https://datastudio.google.com/embed/reporting/3c8a6bd5-b704-4a07-a1bd-e98fc57fb1ce/page/p_n0fz80cc5d?ui=false"></iframe>
      </div>
     
      <!-- Halaman 2: Dashboard Anggaran -->
      <div class="slide" id="slide1">
        <iframe src="https://datastudio.google.com/embed/reporting/3c8a6bd5-b704-4a07-a1bd-e98fc57fb1ce/page/p_b43q8v4c5d?ui=false"></iframe>
      </div>
    </div>

    <!-- Ticker / Pengumuman di Bagian Bawah (Aman, tidak terpengaruh iframe) -->
    <div class="ticker-bar">
      <div class="ticker-label">📢 PENGUMUMAN</div>
      <div class="ticker-content">
        Selamat datang di pemantauan eksekutif — Menyampaikan Terima kasih kepada Tim yang berhasil meraih Juara 1, 2, dan 3 — Pertahankan kinerja terbaik Anda! • Harap perbarui data secara berkala.
      </div>
    </div>
  </div>

<script>
  // Durasi tampil tiap halaman dalam milidetik 
  // Halaman 1 (SDM): 10 detik (10000), Halaman 2 (Anggaran): 5 detik (5000)
  const durasi = [10000, 5000]; 
 
  const slides = document.querySelectorAll('.slide');
  let current = 0;
 
  function nextSlide(){
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
    
    setTimeout(nextSlide, durasi[current]);
  }
 
  // Mulai perputaran slide
  setTimeout(nextSlide, durasi[current]);
</script>

</body>
</html>
